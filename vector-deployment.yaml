# Vector Deployment - 带监控配置
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: monitoring
  labels:
    app: vector
    component: agent
spec:
  selector:
    matchLabels:
      app: vector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: vector
        component: agent
      annotations:
        # Prometheus 自动发现
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.35.0-alpine
          args:
            - --config-dir
            - /etc/vector/
          ports:
            - name: metrics
              containerPort: 9090
              hostPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector/
              readOnly: true
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib
              mountPath: /var/lib/vector
            - name: procfs
              mountPath: /proc
              readOnly: true
            - name: varrun
              mountPath: /var/run
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_SELF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VECTOR_SELF_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /health
              port: 8686
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8686
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
        - name: procfs
          hostPath:
            path: /proc
        - name: varrun
          hostPath:
            path: /var/run
        - name: pods
          hostPath:
            path: /var/log/pods
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      nodeSelector:
        kubernetes.io/os: linux

---
# Vector Service - 用于 Prometheus 抓取
apiVersion: v1
kind: Service
metadata:
  name: vector-metrics
  namespace: monitoring
  labels:
    app: vector
    component: agent
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: vector

---
# Vector ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: monitoring
  labels:
    app: vector

---
# Vector ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
  labels:
    app: vector
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - nodes/proxy
    verbs: ["get"]

---
# Vector ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
  labels:
    app: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: monitoring
