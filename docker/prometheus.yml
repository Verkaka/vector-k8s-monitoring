global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vector-monitoring'

scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Vector Metrics
  - job_name: 'vector'
    static_configs:
      - targets: ['vector:9090']
    metrics_path: /metrics
    scheme: http

  # Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# Alertmanager 配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# 告警规则
rule_files:
  - /etc/prometheus/rules/*.yml
