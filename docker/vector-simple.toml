# Vector 配置 - Docker 环境（简化版）

# Vector 内部指标
[sources.vector_metrics]
type = "internal_metrics"

# Prometheus Exporter
[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["vector_metrics"]
address = "0.0.0.0:9090"
namespace = "vector"

# Docker 日志收集
[sources.docker_logs]
type = "docker_logs"
exclude_containers = ["vector", "prometheus", "grafana", "node-exporter"]

# 控制台输出（调试用）
[sinks.console]
type = "console"
inputs = ["docker_logs"]
encoding.codec = "json"
